<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect
    x="10"
    y="10"
    width="280"
    height="60"
    rx="15"
    fill="none"
    stroke="#FF49BF"
    stroke-width="3"
    opacity="0.8"
    filter="url(#neonGlow)"
  />

  <rect
    x="10"
    y="10"
    width="280"
    height="60"
    rx="15"
    fill="rgba(255,73,191,0.08)"
    stroke="#FF49BF"
    stroke-width="2"
  />

</svg>