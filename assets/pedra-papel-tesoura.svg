<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Pedra Papel Tesoura</title>
  <desc id="desc">Título em estilo cyberpunk neon com texto Pedra Papel Tesoura</desc>

  <defs>
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="45%" stop-color="#00ffcc"/>
      <stop offset="70%" stop-color="#7b2cff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00f5ff"/>
      <stop offset="70%" stop-color="#7b2cff"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="1.5" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feGaussianBlur stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7 H8" stroke="#00f5ff" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
  </defs>

  <g opacity="0.9">
    <path d="M90 58 H230 L252 82 H948 L970 58 H1110" fill="none" stroke="url(#lineGrad)" stroke-width="3" filter="url(#softGlow)"/>
    <path d="M90 202 H230 L252 178 H948 L970 202 H1110" fill="none" stroke="url(#lineGrad)" stroke-width="3" filter="url(#softGlow)"/>
  </g>

  <g opacity="0.75" stroke="#00f5ff" stroke-width="2" fill="none" filter="url(#softGlow)">
    <path d="M42 130 L72 100 H118"/>
    <path d="M42 130 L72 160 H118"/>
    <path d="M1158 130 L1128 100 H1082"/>
    <path d="M1158 130 L1128 160 H1082"/>
  </g>

  <rect x="160" y="42" width="880" height="176" rx="26" fill="url(#scan)" opacity="0.22"/>

  <text x="600" y="145"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Orbitron, Rajdhani, Audiowide, Arial Black, sans-serif"
        font-size="76"
        font-weight="900"
        letter-spacing="5"
        fill="none"
        stroke="#001f2b"
        stroke-width="12"
        opacity="0.9">PEDRA PAPEL TESOURA</text>

  <text x="600" y="145"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Orbitron, Rajdhani, Audiowide, Arial Black, sans-serif"
        font-size="76"
        font-weight="900"
        letter-spacing="5"
        fill="url(#neonText)"
        stroke="#cfffff"
        stroke-width="1.2"
        >PEDRA PAPEL TESOURA</text>

  <text x="600" y="145"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Orbitron, Rajdhani, Audiowide, Arial Black, sans-serif"
        font-size="76"
        font-weight="900"
        letter-spacing="5"
        fill="none"
        stroke="#ffffff"
        stroke-width="0.45"
        opacity="0.8">PEDRA PAPEL TESOURA</text>

  <g fill="#00f5ff" opacity="0.9" filter="url(#softGlow)">
    <rect x="265" y="224" width="86" height="4" rx="2"/>
    <rect x="372" y="224" width="28" height="4" rx="2"/>
    <rect x="800" y="32" width="28" height="4" rx="2"/>
    <rect x="850" y="32" width="86" height="4" rx="2"/>
  </g>
</svg>
